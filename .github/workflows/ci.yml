name: FinLedger Assurance Framework CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu z repozytorium
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Instalacja Foundry (forge + anvil) przez oficjalną akcję foundry-rs
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    # 3. Uruchomienie Anvila w tle
    - name: Start Anvil (Local Blockchain Sandbox)
      run: |
        anvil --host 127.0.0.1 --port 8545 &
        echo "Czekam na uruchomienie Anvila..."
        sleep 3 # Dajemy Anvilowi 3 sekundy na pełne wystartowanie
      # '&' na końcu pierwszej linii powoduje, że proces działa w tle i nie blokuje kolejnych kroków

    # 4. Uruchomienie testów Solidity (Forge)
    - name: Run Forge Tests
      run: |
        cd contracts
        forge test -v
        forge build

    # 5. Instalacja i konfiguracja Pythona
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatyczne keszowanie pobranych paczek

    # 6. Instalacja zależności Pythona
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Jeśli nie masz requirements.txt, zainstalujemy potrzebne pakiety ręcznie:
        pip install pytest web3 python-dotenv eth-abi

    # 7. Utworzenie tymczasowego pliku .env dla środowiska CI
    # W CI używamy dokładnie tego samego klucza prywatnego, który Anvil generuje jako pierwszy
    - name: Create temporary .env file
      run: |
        echo "RPC_URL=http://127.0.0.1:8545" > .env
        echo "PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80" >> .env
        echo "CONTRACT_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3" >> .env

    # 8. Uruchomienie testów E2E w Pythonie
    - name: Run Python E2E Tests
      run: |
        pytest -s -v tests/test_pipeline.py